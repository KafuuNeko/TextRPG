# ============================================================
# 背包配置
# ============================================================
# capacityMode: 容量限制模式
#   "slots"     - 格子数限制（默认）
#   "weight"    - 负重限制
#   "unlimited" - 无限容量
#
# maxSlots:  格子数模式下的上限（默认 30）
# maxWeight: 负重模式下的上限（默认 100.0）
# ============================================================

inventory:
  capacityMode: "slots"
  maxSlots: 30
  maxWeight: 100.0
