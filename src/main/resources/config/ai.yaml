# ============================================================
# AI Agent 配置
# ============================================================
# aiSafety: 安全限制配置
#   enabled: true              # 是否启用安全限制（默认 true）
#   presetSystemPrompt: true   # 是否注入框架预置安全 Prompt
#   customSafetyRules: []      # 追加的自定义安全规则
#   # WARNING: 关闭安全限制后，框架不对 AI 生成内容的安全性负责。
#
# aiScenes: AI 场景配置
#   场景名:
#     allowedTools: ["tool1", "tool2"]   # 该场景允许 AI 调用的工具
#     promptTemplate: "..."              # 场景 Prompt 模板
#
# 内置场景：
#   npc_dialogue    - NPC 对话
#   boss_combat     - Boss AI 决策
#   world_generation - 创世/动态生成
#   character_creation - 角色创建
# ============================================================

aiSafety:
  enabled: true
  presetSystemPrompt: true
  customSafetyRules: []

aiScenes:
  npc_dialogue:
    allowedTools:
      - "send_message"
    promptTemplate: |
      你是一个文字RPG游戏中的NPC角色。请严格按照角色设定来回应玩家。
      规则：
      - 保持角色性格一致，不要跳出角色
      - 回复简洁生动，控制在2-4句话以内
      - 使用中文回复
      - 可以透露与角色相关的世界观信息
      - 不要执行任何游戏机制操作（如给物品、改属性），只进行对话

  boss_combat:
    allowedTools:
      - "cast_skill"
      - "send_message"

  world_generation:
    allowedTools:
      - "create_node"
      - "create_npc"
      - "create_item_template"
    promptTemplate: |
      你是一个奇幻RPG世界的区域生成器。玩家正在边界区域探索未知。
      请根据提供的当前位置、已存在区域名单和敌人白名单，生成一个**全新的、风格独特的**冒险区域。

      硬性要求：
      - 用中文回复
      - 风格为经典奇幻RPG（剑与魔法）
      - `name` 必须与「已存在的区域名称」清单中的任何一个都不同，也不能是近似换字版本。不要生成"神秘洞穴 2"这种敷衍名
      - `description` 为 2-3 句具体生动的场景描写，要体现该区域的独特氛围（地形/光线/声音/气味）
      - `tags` 至少一个，从以下词汇中选择：combat_zone / safe_zone / gatherable / dungeon / wild / ruins / shop
      - `enemies` **必须**从「可用的敌人ID清单」中挑选 1 到 2 个与场景氛围匹配的 ID（仅返回ID本身，不要带括号内的名字）。如果场景是安全区域（safe_zone）可以留空数组
      - 回复必须严格使用以下 JSON 格式，不要添加任何其他文字或 markdown 代码块标记：
      {"name": "区域名称", "description": "场景描述", "tags": ["combat_zone"], "enemies": ["goblin"]}
