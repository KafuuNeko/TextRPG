# ============================================================
# 指令定义配置
# ============================================================
#
# 指令系统完全配置驱动，所有指令通过此文件注册。
#
# --- 字段说明 ---
#
# commandPrefix:  指令前缀（默认 "/"）
# commands:       指令定义映射
#   <key>:        指令唯一标识符
#     displayName:  显示名称
#     aliases:      别名列表（玩家可用别名触发）
#     description:  指令说明
#     params:       参数定义列表
#       - name:     参数名
#         type:     参数类型（string / int / double）
#         required: 是否必填
#     handler:      处理器标识
#                   "builtin:xxx"    → 内置处理器
#                   "script:xxx.kts" → 脚本处理器
#     requires:     前置条件（可选）
#       registered:    是否需要已注册
#       minAttribute:  属性最低值 { key: value }
#       inSession:     需要处于指定会话
#       notInSession:  需要不在任何会话中
#       atNodeTag:     需要所在节点有指定标签
#       hasItem:       需要持有物品 { itemId: quantity }
#       hasBuff:       需要拥有 Buff
#       notHasBuff:    不能拥有 Buff
#     cost:         属性消耗 { key: amount }（执行前扣除）
#
# --- 配置示例（取消注释即可使用） ---
#
# commands:
#   register:
#     displayName: "注册"
#     aliases: ["注册", "reg"]
#     description: "注册新角色"
#     handler: "builtin:register"
#
#   status:
#     displayName: "查看状态"
#     aliases: ["状态", "st", "info"]
#     description: "查看角色当前属性"
#     handler: "builtin:status"
#     requires:
#       registered: true
#
#   help:
#     displayName: "帮助"
#     aliases: ["帮助", "h", "?"]
#     description: "查看可用指令列表"
#     handler: "builtin:help"
#
#   move:
#     displayName: "移动"
#     aliases: ["移动", "go", "走", "往"]
#     params:
#       - name: "target"
#         type: "string"
#         required: true
#     handler: "builtin:move"
#     requires:
#       registered: true
#       notInSession: true
#       minAttribute:
#         action_point: 5
#     cost:
#       action_point: 5

commandPrefix: "/"

commands:
  register:
    displayName: "注册"
    aliases: ["注册", "reg"]
    description: "注册新角色"
    params:
      - name: "name"
        type: "string"
        required: true
    handler: "builtin:register"

  status:
    displayName: "查看状态"
    aliases: ["状态", "st", "info"]
    description: "查看角色当前属性"
    handler: "builtin:status"
    requires:
      registered: true

  move:
    displayName: "移动"
    aliases: ["移动", "go", "走", "前往"]
    description: "移动到相邻区域"
    params:
      - name: "target"
        type: "string"
        required: true
    handler: "builtin:move"
    requires:
      registered: true

  inventory:
    displayName: "背包"
    aliases: ["背包", "bag", "inv", "物品"]
    description: "查看背包物品"
    handler: "builtin:inventory"
    requires:
      registered: true

  equip:
    displayName: "装备"
    aliases: ["装备", "eq"]
    description: "装备物品或查看装备栏"
    params:
      - name: "item_name"
        type: "string"
        required: false
    handler: "builtin:equip"
    requires:
      registered: true

  unequip:
    displayName: "卸下"
    aliases: ["卸下", "脱下", "uneq"]
    description: "卸下装备"
    params:
      - name: "slot_name"
        type: "string"
        required: true
    handler: "builtin:unequip"
    requires:
      registered: true

  battle:
    displayName: "战斗"
    aliases: ["战斗", "fight", "挑战"]
    description: "与当前区域的敌人战斗"
    params:
      - name: "enemy_name"
        type: "string"
        required: false
    handler: "builtin:battle"
    requires:
      registered: true

  dialogue:
    displayName: "对话"
    aliases: ["对话", "talk", "交谈"]
    description: "与当前区域的 NPC 对话"
    params:
      - name: "npc_name"
        type: "string"
        required: false
    handler: "builtin:dialogue"
    requires:
      registered: true

  quest:
    displayName: "任务"
    aliases: ["任务", "quest"]
    description: "查看任务 / 接取 / 交付"
    params:
      - name: "action"
        type: "string"
        required: false
    handler: "builtin:quest"
    requires:
      registered: true

  shop:
    displayName: "商店"
    aliases: ["商店", "买", "卖"]
    description: "NPC 商店买卖"
    params:
      - name: "action"
        type: "string"
        required: false
    handler: "builtin:shop"
    requires:
      registered: true
